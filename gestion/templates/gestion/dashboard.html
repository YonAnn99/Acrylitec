<!-- Selector de vista con filtros -->
<div class="mb-3 d-flex align-items-center gap-2 flex-wrap">

    <!-- Por Mes -->
    <div class="dropdown">
        <button class="btn btn-dark active dropdown-toggle" id="btnMes"
                onclick="mostrarGrafica('mes', this)"
                data-bs-toggle="dropdown" aria-expanded="false">
            📅 Por Mes
        </button>
        <ul class="dropdown-menu" id="menuMeses">
            <li><h6 class="dropdown-header">Selecciona año</h6></li>
            <li id="aniosMes"></li>
            <li><hr class="dropdown-divider"></li>
            <li><h6 class="dropdown-header">Selecciona mes</h6></li>
            <li><a class="dropdown-item active" href="#" onclick="filtrarMes('todos', this)">Todos los meses</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(1, this)">Enero</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(2, this)">Febrero</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(3, this)">Marzo</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(4, this)">Abril</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(5, this)">Mayo</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(6, this)">Junio</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(7, this)">Julio</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(8, this)">Agosto</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(9, this)">Septiembre</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(10, this)">Octubre</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(11, this)">Noviembre</a></li>
            <li><a class="dropdown-item" href="#" onclick="filtrarMes(12, this)">Diciembre</a></li>
        </ul>
    </div>

    <!-- Por Semana -->
    <div class="dropdown">
        <button class="btn btn-outline-dark dropdown-toggle" id="btnSemana"
                onclick="mostrarGrafica('semana', this)"
                data-bs-toggle="dropdown" aria-expanded="false">
            📆 Por Semana
        </button>
        <ul class="dropdown-menu" style="max-height:300px; overflow-y:auto;" id="menuSemanas">
            <li><h6 class="dropdown-header">Selecciona semana</h6></li>
            <li><a class="dropdown-item active" href="#" onclick="filtrarSemana('todas', this)">Todas las semanas</a></li>
        </ul>
    </div>

    <!-- Por Año -->
    <div class="dropdown">
        <button class="btn btn-outline-dark dropdown-toggle" id="btnAnio"
                onclick="mostrarGrafica('anio', this)"
                data-bs-toggle="dropdown" aria-expanded="false">
            📊 Por Año
        </button>
        <ul class="dropdown-menu" id="menuAnios">
            <li><h6 class="dropdown-header">Selecciona año</h6></li>
            <li><a class="dropdown-item active" href="#" onclick="filtrarAnio('todos', this)">Todos los años</a></li>
        </ul>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const datos = {
    mes:    { labels: JSON.parse('{{ labels_mes|escapejs }}'),    data: JSON.parse('{{ data_mes|escapejs }}') },
    semana: { labels: JSON.parse('{{ labels_semana|escapejs }}'), data: JSON.parse('{{ data_semana|escapejs }}') },
    anio:   { labels: JSON.parse('{{ labels_anio|escapejs }}'),   data: JSON.parse('{{ data_anio|escapejs }}') },
};

// Estado actual
let periodoActivo = 'mes';
let filtroMesNum = 'todos';
let filtroAnioMes = 'todos';
let filtroSemana = 'todas';
let filtroAnioAnio = 'todos';

const ctx = document.getElementById('graficaIngresos').getContext('2d');
let chart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: datos.mes.labels,
        datasets: [{
            label: 'Ingresos ($)',
            data: datos.mes.data,
            backgroundColor: 'rgba(25, 135, 84, 0.7)',
            borderColor: 'rgba(25, 135, 84, 1)',
            borderWidth: 1,
            borderRadius: 6,
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true,
            ticks: { callback: v => '$' + v.toLocaleString() }
        }}
    }
});

// Nombres de meses para parseo
const MESES_ES = ['ene','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec',
                  'jan','ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const MESES_NUM = {
    'jan':1,'feb':2,'mar':3,'apr':4,'may':5,'jun':6,
    'jul':7,'aug':8,'sep':9,'oct':10,'nov':11,'dec':12,
    'ene':1,'abr':4,'ago':8,'dic':12
};

function getAnioDeLabel(label) {
    // "Mar 2026" → 2026
    const parts = label.split(' ');
    return parts[parts.length - 1];
}

function getMesDeLabel(label) {
    // "Mar 2026" → 3
    const mes = label.split(' ')[0].toLowerCase().substring(0, 3);
    return MESES_NUM[mes] || 0;
}

function getSemanaDeLabel(label) {
    // "Sem 13/03" → "Sem 13/03"
    return label;
}

// Poblar dropdowns dinámicamente al cargar
function poblarDropdowns() {
    // Años en datos de mes
    const aniosMes = [...new Set(datos.mes.labels.map(getAnioDeLabel))].sort();
    const contAniosMes = document.getElementById('aniosMes');
    contAniosMes.innerHTML = aniosMes.map(a =>
        `<a class="dropdown-item" href="#" onclick="filtrarAnioEnMes('${a}', this)">${a}</a>`
    ).join('');

    // Semanas disponibles
    const menuSem = document.getElementById('menuSemanas');
    datos.semana.labels.forEach(label => {
        const li = document.createElement('li');
        li.innerHTML = `<a class="dropdown-item" href="#" onclick="filtrarSemana('${label}', this)">${label}</a>`;
        menuSem.appendChild(li);
    });

    // Años disponibles en datos de año
    const menuAnio = document.getElementById('menuAnios');
    datos.anio.labels.forEach(label => {
        const li = document.createElement('li');
        li.innerHTML = `<a class="dropdown-item" href="#" onclick="filtrarAnio('${label}', this)">${label}</a>`;
        menuAnio.appendChild(li);
    });
}

function actualizarGrafica(labels, data) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = data;
    chart.update();
}

function mostrarGrafica(periodo, btn) {
    periodoActivo = periodo;
    // Reset filtros
    filtroMesNum = 'todos';
    filtroSemana = 'todas';
    filtroAnioAnio = 'todos';

    // Actualizar estilos botones
    ['btnMes', 'btnSemana', 'btnAnio'].forEach(id => {
        const b = document.getElementById(id);
        b.classList.remove('btn-dark', 'active');
        b.classList.add('btn-outline-dark');
    });
    btn.classList.remove('btn-outline-dark');
    btn.classList.add('btn-dark', 'active');

    actualizarGrafica(datos[periodo].labels, datos[periodo].data);
}

function filtrarMes(mes, el) {
    filtroMesNum = mes;
    // Marcar activo
    document.querySelectorAll('#menuMeses .dropdown-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');

    let labels, data;
    if (mes === 'todos') {
        labels = datos.mes.labels;
        data = datos.mes.data;
    } else {
        labels = []; data = [];
        datos.mes.labels.forEach((l, i) => {
            if (getMesDeLabel(l) === mes) {
                labels.push(l); data.push(datos.mes.data[i]);
            }
        });
    }
    actualizarGrafica(labels, data);
}

function filtrarAnioEnMes(anio, el) {
    filtroAnioMes = anio;
    document.querySelectorAll('#aniosMes .dropdown-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');

    let labels = [], data = [];
    datos.mes.labels.forEach((l, i) => {
        if (getAnioDeLabel(l) === anio) {
            labels.push(l); data.push(datos.mes.data[i]);
        }
    });
    actualizarGrafica(labels, data);
}

function filtrarSemana(semana, el) {
    filtroSemana = semana;
    document.querySelectorAll('#menuSemanas .dropdown-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');

    let labels, data;
    if (semana === 'todas') {
        labels = datos.semana.labels;
        data = datos.semana.data;
    } else {
        const idx = datos.semana.labels.indexOf(semana);
        labels = idx >= 0 ? [datos.semana.labels[idx]] : [];
        data   = idx >= 0 ? [datos.semana.data[idx]] : [];
    }
    actualizarGrafica(labels, data);
}

function filtrarAnio(anio, el) {
    filtroAnioAnio = anio;
    document.querySelectorAll('#menuAnios .dropdown-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');

    let labels, data;
    if (anio === 'todos') {
        labels = datos.anio.labels;
        data = datos.anio.data;
    } else {
        const idx = datos.anio.labels.indexOf(anio);
        labels = idx >= 0 ? [datos.anio.labels[idx]] : [];
        data   = idx >= 0 ? [datos.anio.data[idx]] : [];
    }
    actualizarGrafica(labels, data);
}

// Inicializar dropdowns al cargar
poblarDropdowns();
</script>
