{% extends 'gestion/base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-7">
            <h2 class="mb-4">🧾 Nueva Cotización</h2>
            <form method="POST" id="formCotizacion">
                {% csrf_token %}
                
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-dark text-white">Medidas y Servicios</div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Largo (cm)</label>
                                <input type="number" name="largo_pza" step="0.01" class="form-control" placeholder="ej. 20" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Ancho (cm)</label>
                                <input type="number" name="ancho_pza" step="0.01" class="form-control" placeholder="ej. 10" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Minutos Láser</label>
                                <input type="number" name="minutos_lazer" step="1" value="0" class="form-control">
                            </div>
                        </div>
                        <div class="row mt-2">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Espesor (mm)</label>
                                <select name="espesor_mm" id="id_espesor" class="form-select" required>
                                    <option value="">-- Selecciona --</option>
                                    {% for t in materiales_tabulador %}
                                        <option value="{{ t.espesor_mm }}" data-factor="{{ t.factor_costo }}">
                                            {{ t.espesor_mm }} mm
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-success btn-lg w-100 shadow">
                    ✅ Guardar Cotización
                </button>
            </form>
        </div>

        <div class="col-md-5">
            <div class="card shadow border-0 sticky-top" style="top:20px">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">💰 Cálculo en tiempo real</h5>
                </div>
                <div class="card-body text-center py-4">
                    <p class="text-muted mb-1">Área calculada:</p>
                    <h4 id="display_area">0.00 cm²</h4>
                    <hr>
                    <p class="text-muted mb-1">Monto estimado:</p>
                    <h2 class="text-success fw-bold" id="display_total">$0.00</h2>
                    <p class="small text-muted mt-2">Basado en el factor de espesor seleccionado.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

function calcularMontoRealTime() {
    const largo = parseFloat(document.querySelector('input[name="largo_pza"]').value) || 0;
    const ancho = parseFloat(document.querySelector('input[name="ancho_pza"]').value) || 0;
    const minutosLaser = parseFloat(document.querySelector('input[name="minutos_lazer"]').value) || 0;
    const utilidadPorcentaje = parseFloat(document.querySelector('input[name="porcentaje_utilidad"]').value) || 40;
    
    // Obtener factor dinámico del select
    const espesorSelect = document.getElementById('id_espesor');
    const selectedOption = espesorSelect.options[espesorSelect.selectedIndex];
    // Nota: El factor en tu tabla está por m2 (ej. 400.00), lo dividimos entre 10,000 para cm2
    const factorM2 = selectedOption ? parseFloat(selectedOption.getAttribute('data-factor')) || 0 : 0;
    const factorCm2 = factorM2 / 10000; 

    const area = largo * ancho;
    const costoMaterial = area * factorCm2;
    const utilidad = costoMaterial * (utilidadPorcentaje / 100);
    const costoLaser = minutosLaser * 10.00; // Tarifa actual según tu captura

    const total = costoMaterial + utilidad + costoLaser;

    document.getElementById('display_area').innerText = area.toFixed(2) + " cm²";
    document.getElementById('display_total').innerText = "$" + total.toLocaleString('es-MX', {minimumFractionDigits: 2});
}

// Eventos para actualizar al instante
document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('input', calcularMontoRealTime);
    el.addEventListener('change', calcularMontoRealTime);
});

</script>
{% endblock %}
