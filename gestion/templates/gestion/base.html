{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acrylitec - Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand navbar-dark bg-dark mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="{% url 'dashboard' %}">
                <img src="{% static 'gestion/img/logo_acrylitec.png' %}"
                     alt="Acrylitec" height="36"
                     style="filter: drop-shadow(0 0 2px rgba(255,255,255,0.3));">
                Acrylitec
            </a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'dashboard' %}">
                    <i class="bi bi-bar-chart-fill"></i> Dashboard
                </a>
                <a class="nav-link" href="{% url 'lista_cotizaciones' %}">
                    <i class="bi bi-file-earmark-text"></i> Cotizaciones
                </a>
                <a class="nav-link" href="{% url 'lista_ventas' %}">
                    <i class="bi bi-bag-check"></i> Ventas
                </a>
                <a class="nav-link" href="{% url 'lista_clientes' %}">
                    <i class="bi bi-people"></i> Clientes
                </a>
                <a class="nav-link" href="{% url 'lista_materiales' %}">
                    <i class="bi bi-boxes"></i> Inventario
                </a>
                <a class="nav-link" href="{% url 'lista_productos' %}">
                    <i class="bi bi-grid"></i> Productos
                </a>
                <a class="nav-link" href="{% url 'configuracion_precios' %}">
                    <i class="bi bi-gear"></i> Precios
                </a>
            </div>
        </div>
    </nav>
    <div class="container-fluid px-4">
        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
