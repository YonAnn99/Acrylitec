{% extends 'gestion/base.html' %}

{% block content %}
<div class="card shadow mx-auto" style="max-width: 600px;">
    <div class="card-header bg-primary text-white">
        <h3>Registrar Nuevo Material</h3>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Descripción del Acrílico</label>
                <input type="text" name="descripcion" class="form-control" required>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Largo (cm)</label>
                    <input type="number" step="0.01" name="largo" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Ancho (cm)</label>
                    <input type="number" step="0.01" name="ancho" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number" name="stock" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Stock Mínimo</label>
                    <input type="number" name="stock_minimo" class="form-control" required>
                 </div>
            </div>
            <button type="submit" class="btn btn-success w-100">Guardar en Base de Datos</button>
        </form>
    </div>
</div>
{% endblock %}
